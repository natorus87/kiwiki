<div class="content-inner">
  <h2>Tags</h2>
  {% if tags %}
  <div class="tag-cloud">
    {% for t in tags %}
    <div class="tag-item">
      <a href="/?search={{ ('tag:' ~ t.tag)|urlencode }}" class="tag-chip kw-search-link" data-search-query="tag:{{ t.tag }}">
        {{ t.tag }}
        <span class="tag-count">{{ t.count }}</span>
      </a>
      <details class="tag-files">
        <summary>{{ t.count }} Datei{{ 'en' if t.count != 1 else '' }}</summary>
        <ul>
          {% for f in t.files %}
          <li><a href="/?file={{ f|urlencode }}" class="kw-file-link" data-file-path="{{ f }}">{{ f }}</a></li>
          {% endfor %}
        </ul>
      </details>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <p>Noch keine Tags vorhanden. Tags werden in den Frontmatter-Dateien definiert.</p>
  </div>
  {% endif %}
</div>
