# Image Konfiguration
image:
  repository: natorus87/kiwiki
  pullPolicy: IfNotPresent
  tag: "3.0.0"

# Deployment
replicaCount: 1

# Deployment-Strategie. "Recreate" stoppt den alten Pod bevor der neue startet —
# Pflicht bei ReadWriteOnce-PVC und für die Multi-Tenant-Migration auf /data.
# Auf "RollingUpdate" wechseln nur wenn replicaCount > 1 UND PVC ReadWriteMany.
deploymentStrategy: Recreate

# Service Konfiguration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

traefikRoute:
  v2:
    enabled: false
    entrypoint: websecure
    hosts:
      - kiwiki.local
  v3:
    enabled: false
    entrypoint: websecure
    hosts:
      - kiwiki.local
  # CORS-Middleware — nur für Browser-Clients mit abweichender Origin nötig
  cors:
    allowOrigins: []
  # SSE-Einstellungen für /mcp/sse (MCP-Stream-Transport)
  sse:
    # -1 = sofortiges Flushen jedes Chunks (Pflicht für SSE)
    flushInterval: "-1"
    # Timeout für Response-Header vom Backend (hoch setzen für lang-lebige SSE-Verbindungen)
    responseHeaderTimeout: "1h"

# Ingress (optional)
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  # CORS + SSE-Einstellungen — werden als nginx-Annotations gerendert
  cors:
    enabled: false
    allowOrigin: ""
    allowMethods: "GET, POST, OPTIONS"
    allowHeaders: "Authorization, Content-Type, Cache-Control"
    maxAge: "86400"
  hosts:
    - host: kiwiki.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: kiwiki-tls
  #   hosts:
  #     - kiwiki.local

# Ressourcen
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Persistenter Speicher für Wiki-Daten
persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""
  existingClaim: ""

# Umgebungsvariablen
env:
  KIWIKI_DATA_DIR: "/data"
  KIWIKI_BASE_URL: "https://kiwiki.example.com"  # Pflicht: auf öffentliche URL setzen
  KIWIKI_TRUST_PROXY: "true"  # auf "false" fuer lokale Entwicklung ohne Proxy
  KIWIKI_CORS_ORIGINS: ""  # Leer deaktiviert CORS; sonst explizite Origins kommagetrennt setzen
  KIWIKI_RATE_LIMIT_ENABLED: "true"  # Rate Limiting aktivieren (empfohlen)

existingSecret: ""

secretEnv:
  # Builtin-Benutzer. Diese Accounts werden in der Web-UI angezeigt, gelten als
  # geschützt und können nur durch Helm geändert werden.
  KIWIKI_USERS: ""
  # In Produktion durch einen starken Zufallswert ersetzen.
  KIWIKI_OAUTH_TOKEN_SECRET: ""

# Health Checks
livenessProbe:
  enabled: true
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

# Node Selector / Tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# Restart Policy
restartPolicy: Always
