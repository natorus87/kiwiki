{{- if .Values.ingress.enabled -}}
{{- $cors := .Values.ingress.cors }}
{{- $corsAnnotations := dict }}
{{- if $cors.enabled }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/enable-cors" "true" }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/cors-allow-origin" $cors.allowOrigin }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/cors-allow-methods" $cors.allowMethods }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/cors-allow-headers" $cors.allowHeaders }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/cors-max-age" $cors.maxAge }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/proxy-buffering" "off" }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/proxy-read-timeout" "3600" }}
{{- $_ := set $corsAnnotations "nginx.ingress.kubernetes.io/proxy-send-timeout" "3600" }}
{{- end }}
{{- $mergedAnnotations := merge .Values.ingress.annotations $corsAnnotations }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kiwiki.fullname" . }}
  labels:
    {{- include "kiwiki.labels" . | nindent 4 }}
  {{- with $mergedAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "kiwiki.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
